<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/gatewayweb/assets/logo-CQ1xvCtI.png" id="web-icon-link" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 性能优化 - 预加载关键资源 -->
    <link rel="preload" href="/gatewayweb/assets/logo-CQ1xvCtI.png" as="image" type="image/png" />

    <title>Hub App</title>
    <style>
      /* 静态首屏 Loading：无第三方依赖；Vue 启动后在 `main.ts` 移除 `#app-boot-splash` */
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        /* 与登录页 body 兜底色一致，避免 splash 消失瞬间闪色 */
        background-color: #121638;
      }
      #app {
        height: 100%;
      }
      .app-loading {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        overscroll-behavior: none;
        isolation: isolate;
        color-scheme: dark;
        /* 与 LoginView `.login-view` 同款全屏底图，保证首屏与登录页视觉连续 */
        background:
          radial-gradient(100% 70% at 85% 15%, rgba(120, 80, 255, 0.38) 0%, transparent 55%),
          radial-gradient(80% 55% at 8% 88%, rgba(0, 200, 255, 0.18) 0%, transparent 52%),
          linear-gradient(152deg, #0a0f1c 0%, #121638 38%, #1e1b4b 72%, #312e81 100%);
        background-color: #121638;
        color: rgba(255, 255, 255, 0.92);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
          'Noto Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      .app-loading::before {
        content: '';
        position: absolute;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(105deg, rgba(15, 23, 42, 0.2) 0%, rgba(15, 23, 42, 0.45) 100%);
        background-size: 28px 28px, 28px 28px, auto;
        background-repeat: repeat, repeat, no-repeat;
        background-position: 0 0, 0 0, center;
        pointer-events: none;
      }
      .app-loading::after {
        content: '';
        position: absolute;
        inset: -45%;
        z-index: 0;
        background: conic-gradient(
          from 200deg at 50% 50%,
          transparent 0deg,
          rgba(99, 102, 241, 0.1) 100deg,
          transparent 220deg
        );
        animation: app-login-glow 22s linear infinite;
        pointer-events: none;
      }
      @keyframes app-login-glow {
        to {
          transform: rotate(360deg);
        }
      }
      .app-loading__card {
        width: min(520px, calc(100vw - 48px));
        /* 接近登录表单卡片的浅色磨砂底 */
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.45);
        border-radius: 16px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        padding: 18px 18px 16px;
        position: relative;
        z-index: 1;
      }
      .app-loading__card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 16px;
        background: linear-gradient(145deg, rgba(99, 102, 241, 0.12), rgba(56, 189, 248, 0.08));
        opacity: 0.5;
        pointer-events: none;
      }
      .app-loading__row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .app-loading__brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        position: relative;
        z-index: 1;
      }
      .app-loading__logo {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.75);
        display: grid;
        place-items: center;
        overflow: hidden;
        flex: 0 0 auto;
        border: 1px solid rgba(148, 163, 184, 0.45);
      }
      .app-loading__logo img {
        width: 22px;
        height: 22px;
        display: block;
      }
      .app-loading__spinner {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid rgba(99, 102, 241, 0.25);
        border-top-color: rgba(99, 102, 241, 0.95);
        animation: appSpin 0.8s linear infinite;
        flex: 0 0 auto;
        position: relative;
        z-index: 1;
      }
      @keyframes appSpin {
        to {
          transform: rotate(360deg);
        }
      }
      .app-loading__title {
        font-size: 14px;
        font-weight: 650;
        line-height: 20px;
        letter-spacing: 0.2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: rgba(15, 23, 42, 0.92);
      }
      .app-loading__desc {
        margin-top: 8px;
        font-size: 12px;
        line-height: 18px;
        color: rgba(51, 65, 85, 0.78);
        position: relative;
        z-index: 1;
      }
      .app-loading__bar {
        margin-top: 12px;
        height: 4px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.08);
        overflow: hidden;
        position: relative;
        z-index: 1;
      }
      .app-loading__bar::before {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #6366f1, #8b5cf6);
        border-radius: 999px;
        animation: appIndeterminate 1.2s ease-in-out infinite;
      }
      @keyframes appIndeterminate {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(260%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-loading::after,
        .app-loading__spinner,
        .app-loading__bar::before {
          animation: none !important;
        }
      }
    </style>
    <script type="module" crossorigin src="/gatewayweb/assets/index--fOG6FhZ.js"></script>
  </head>
  <body>
    <div
      id="app-boot-splash"
      class="app-loading"
      role="status"
      aria-live="polite"
      aria-label="应用加载中"
    >
      <div class="app-loading__card">
        <div class="app-loading__row">
          <div class="app-loading__brand">
            <div class="app-loading__logo" aria-hidden="true">
              <img src="/gatewayweb/assets/logo-CQ1xvCtI.png" alt="" />
            </div>
            <div class="app-loading__title">正在加载应用…</div>
          </div>
          <div style="flex: 1 1 auto"></div>
          <div class="app-loading__spinner" aria-hidden="true"></div>
        </div>
        <div class="app-loading__desc">首次打开可能需要更久一点，请稍候。</div>
        <div class="app-loading__bar" aria-hidden="true"></div>
      </div>
    </div>
    <div id="app"></div>
  </body>
</html>
